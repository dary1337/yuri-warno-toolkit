name: Feature request / idea
description: Suggest something new or an improvement
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you like the toolkit to do?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What would it help with
      description: The problem it solves or the workflow it improves.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
