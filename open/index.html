<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Open in Yuri's WARNO Toolkit</title>
        <style>
            :root {
                color-scheme: dark;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #141218;
                color: #e6e0e9;
                font:
                    16px/1.5 system-ui,
                    'Segoe UI',
                    sans-serif;
                text-align: center;
            }
            .card {
                max-width: 420px;
                padding: 32px 28px;
            }
            h1 {
                font-size: 20px;
                margin: 0 0 8px;
                font-weight: 600;
            }
            p {
                color: #cac4d0;
                margin: 0 0 20px;
            }
            a.btn {
                display: inline-block;
                background: #d0bcff;
                color: #381e72;
                text-decoration: none;
                padding: 12px 24px;
                border-radius: 100px;
                font-weight: 600;
            }
            a.btn:hover {
                filter: brightness(1.06);
            }
            .muted {
                margin-top: 22px;
                font-size: 13px;
                color: #948f99;
            }
            .muted a {
                color: #948f99;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Opening in Yuri's WARNO Toolkit…</h1>
            <p id="sub">If nothing happens, click the button below.</p>
            <a id="open" class="btn" href="#">▶ Open the deck</a>
            <p class="muted">Don't have the toolkit? Open beta coming soon 🤫</p>
        </div>
        <script>
            (function () {
                var q = location.search;
                var sub = document.getElementById('sub');
                var link = document.getElementById('open');
                if (!q || q === '?') {
                    sub.textContent = 'This link has no deck in it.';
                    link.style.display = 'none';
                    return;
                }
                var target = 'ywt://deck' + q;
                link.href = target;
                try {
                    var name = new URLSearchParams(q).get('name');
                    if (name) sub.textContent = 'Importing “' + name + '” — if nothing happens, click below.';
                } catch (e) {}
                location.replace(target);
            })();
        </script>
    </body>
</html>
